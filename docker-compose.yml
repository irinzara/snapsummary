version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: snapsummary_db
    restart: always
    environment:
      MYSQL_DATABASE: snapsummary
      MYSQL_USER: snapuser
      MYSQL_PASSWORD: snappass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: snapsummary_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SECRET_KEY=your-secret-key-change-in-production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DB_NAME=snapsummary
      - DB_USER=snapuser
      - DB_PASSWORD=snappass
      - DB_HOST=db
      - DB_PORT=3306
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: snapsummary_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
  media_files:
