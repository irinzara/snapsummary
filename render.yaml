services:
  # ── Django Backend ──────────────────────────────────────────────
  - type: web
    name: snapsummary-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: snapsummary-backend.onrender.com
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1

  # ── React Frontend ──────────────────────────────────────────────
  - type: web
    name: snapsummary-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: snapsummary-backend
          type: web
          property: host
